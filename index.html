<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyaya Sahayi - Your Legal AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg-main: #ffffff;
            --bg-secondary: #f9fafb;
            --text-main: #111827;
            --text-dim: #6b7280;
            --border-color: #e5e7eb;
            --ai-bubble: #f3f4f6;
            --user-bubble: #4f46e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1rem 1.5rem;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        #chat-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: var(--bg-main);
        }

        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 0;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--ai-bubble);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 0;
        }

        .input-area {
            padding: 1rem 1.5rem;
            background: var(--bg-main);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .typing {
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.8rem;
            position: absolute;
            bottom: 4.5rem;
            left: 1.5rem;
            display: none;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            header {
                padding: 0.75rem 1rem;
            }

            header h1 {
                font-size: 1.1rem;
            }

            #chat-container {
                padding: 1rem;
            }

            .message {
                max-width: 90%;
                font-size: 0.9rem;
            }

            .input-area {
                padding: 0.75rem 1rem;
            }

            button {
                padding: 0.75rem 1rem;
            }

            button span {
                display: none;
            }

            /* Hide "Send" text on tiny screens, show only icon if present */
        }
    </style>
</head>

<body>
    <header>
        <h1>Nyaya Sahayi</h1>
        <div style="font-size: 0.85rem; color: var(--text-dim);">Legal AI Assistant</div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Namaskaram! I am your Nyaya Sahayi AI. How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <div id="typing-indicator" class="typing">Nyaya Sahayi is thinking...</div>
        <input type="text" id="user-input" placeholder="Ask about your case or legal procedures..." autocomplete="off">
        <button id="send-btn">
            Send
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        // Update this URL after setting up Ngrok in Terminal 2
        const BACKEND_URL = "http://localhost:8000/api/chat";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Extract client token from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const clientToken = urlParams.get('token') || 'default_client';


        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage(message, true);
            userInput.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        client_id: clientToken
                    })
                });

                const data = await response.json();

                if (data.response) {
                    appendMessage(data.response, false);
                } else {
                    appendMessage("I encountered an error processing your request.", false);
                }
            } catch (error) {
                console.error('Error:', error);
                appendMessage("Fail to connect to the backend. Please ensure the server is running.", false);
            } finally {
                typingIndicator.style.display = 'none';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
